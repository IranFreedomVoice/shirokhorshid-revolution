<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>برنامه گذار شاهزاده رضا پهلوی</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Tahoma, Arial, sans-serif;
      color: #111;
    }

    .wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .card {
      background: #fffaf5;
      border: 2px solid #888;
      border-radius: 22px;
      padding: 36px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 34px;
      font-weight: 700;
      color: #333;
    }

    p {
      margin: 0 0 28px;
      font-size: 18px;
      line-height: 1.9;
      color: #333;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .action-btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 14px;
      background: #fff;
      border: 2px solid #888;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
    }

    @media (max-width: 600px) {
      .wrapper {
        padding: 24px 14px 40px;
      }

      .card {
        padding: 28px 18px;
      }

      h1 {
        font-size: 26px;
      }

      p {
        font-size: 16px;
      }

      .action-btn {
        font-size: 16px;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>برنامه گذار شاهزاده رضا پهلوی</h1>
      <p>برای ورود به صفحه فارسی، روی دکمه زیر بزنید.</p>

      <div class="btn-row">
        <a class="action-btn" href="https://www.rezapahlavi.org/fa" target="_blank" rel="noopener noreferrer">باز کردن سایت</a>
        <a class="action-btn" href="farsi.html">بازگشت</a>
      </div>
    </div>
  </div>
</body>
</html>
