<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shir-o-Khorshid Revolution</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #d9f6f7;
      color: #111;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: #1f1f1f;
      color: white;
    }

    .site-title {
      font-size: 20px;
      font-weight: 700;
    }

    .menu-icon {
      font-size: 28px;
      cursor: pointer;
    }

    .flag img {
      width: 100%;
      display: block;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 18px 50px;
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
    }

    .section-title {
      font-size: 26px;
      font-weight: 700;
      margin: 28px 0 18px;
      text-align: center;
    }

    .lang-buttons,
    .video-grid {
      display: grid;
      gap: 14px;
    }

    .lang-buttons {
      grid-template-columns: 1fr;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    .video-grid {
      grid-template-columns: 1fr;
    }

    .button,
    .video-card {
      border: 2px solid #888;
      border-radius: 20px;
      background: linear-gradient(to right, #19b543 0%, #ffffff 50%, #ef1c1c 100%);
      text-decoration: none;
      color: #111;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .button {
      padding: 16px 18px;
      font-size: 20px;
      font-weight: 700;
      text-align: left;
      display: block;
    }

    .hero-box {
      background: white;
      border: 2px solid #999;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 28px;
      text-align: center;
    }

    .hero-box img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 18px;
    }

    .hero-caption {
      margin-top: 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .video-card {
      overflow: hidden;
      background: white;
    }

    .video-thumb {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      font-size: 26px;
      font-weight: 700;
    }

    .video-text {
      padding: 14px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    @media (min-width: 800px) {
      .video-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="site-title">Shir-o-Khorshid Revolution</div>
    <div class="menu-icon">☰</div>
  </div>

  <div class="flag">
    <img src="flag-main.jpg" alt="Lion and Sun Flag" />
  </div>

  <div class="container">
    <div class="hero-box">
      <img src="pahlavi-1.jpg" alt="Prince Reza Pahlavi" />
      <div class="hero-caption">Important Message</div>
    </div>

    <div class="section-title">Languages</div>
    <div class="lang-buttons">
      <a class="button" href="index.html">English</a>
      <a class="button" href="farsi.html">فارسی</a>
      <a class="button" href="deutsch.html">Deutsch</a>
    </div>

    <div class="section-title">Important Videos</div>
    <div class="video-grid">
      <div class="video-card">
        <div class="video-thumb">Video 1</div>
        <div class="video-text">Important Video 1</div>
      </div>

      <div class="video-card">
        <div class="video-thumb">Video 2</div>
        <div class="video-text">Important Video 2</div>
      </div>
    </div>
  </div>
</body>
</html>
