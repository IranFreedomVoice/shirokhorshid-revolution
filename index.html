<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shir-o-Khorshid Revolution</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    .hero img.flag {
      width: 100%;
      display: block;
    }

    .site-title {
      position: absolute;
      top: 14px;
      left: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      background: rgba(0,0,0,0.35);
      padding: 6px 10px;
      border-radius: 10px;
    }

    .top-controls {
      position: absolute;
      top: 12px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 5;
    }

    .lang-mini {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.35);
      padding: 6px 8px;
      border-radius: 10px;
    }

    .lang-mini a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 4px;
    }

    .menu-icon {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      background: rgba(0,0,0,0.35);
      padding: 4px 10px;
      border-radius: 10px;
      line-height: 1;
      cursor: pointer;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 50px;
    }

    .hero-box {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 26px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .hero-box img {
      width: 100%;
      max-height: 430px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
    }

    .hero-caption {
      margin-top: 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .section-title {
      font-size: 26px;
      font-weight: 700;
      margin: 26px 0 18px;
      text-align: center;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .video-card {
      display: block;
      text-decoration: none;
      color: #111;
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .video-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .video-text {
      padding: 14px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    @media (min-width: 800px) {
      .video-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .site-title {
        font-size: 13px;
        top: 10px;
        left: 10px;
        padding: 5px 8px;
      }

      .top-controls {
        top: 10px;
        right: 10px;
        gap: 6px;
      }

      .lang-mini {
        gap: 4px;
        padding: 5px 6px;
      }

      .lang-mini a {
        font-size: 11px;
      }

      .menu-icon {
        font-size: 20px;
        padding: 4px 8px;
      }

      .hero-caption,
      .video-text {
        font-size: 18px;
      }

      .video-card img {
        height: 210px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img class="flag" src="flag-main.jpg" alt="Lion and Sun Flag" />

    <div class="site-title">Shir-o-Khorshid Revolution</div>

    <div class="top-controls">
      <div class="lang-mini">
        <a href="index.html">EN</a>
        <a href="farsi.html">FA</a>
        <a href="deutsch.html">DE</a>
      </div>
      <div class="menu-icon">☰</div>
    </div>
  </div>

  <div class="container">
    <div class="hero-box">
      <img src="pahlavi-1.jpg" alt="Prince Reza Pahlavi" />
      <div class="hero-caption">Important Message</div>
    </div>

    <div class="section-title">Important Videos</div>

    <div class="video-grid">
      <a class="video-card" href="#">
        <img src="video-1.jpg" alt="Video 1" />
        <div class="video-text">Important Video 1</div>
      </a>

      <a class="video-card" href="#">
        <img src="video-2.jpg" alt="Video 2" />
        <div class="video-text">Important Video 2</div>
      </a>
    </div>
  </div>

</body>
</html>
