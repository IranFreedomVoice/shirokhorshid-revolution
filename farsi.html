<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انقلاب شیر و خورشید</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #d9f6f7;
      font-family: Tahoma, Arial, sans-serif;
      color: #111;
    }

    .flag-header {
      position: relative;
      width: 100%;
      min-height: 150px;
      background: url("flag-main.jpg") center center / cover no-repeat;
      border-bottom: 1px solid rgba(0,0,0,0.15);
    }

    .flag-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.12);
    }

    .flag-inner {
      position: relative;
      z-index: 2;
      min-height: 150px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 18px;
      gap: 12px;
    }

    .site-title {
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
      background: rgba(0,0,0,0.18);
      padding: 8px 14px;
      border-radius: 14px;
    }

    .lang-wrap {
      position: relative;
      direction: ltr;
    }

    .lang-btn {
      border: 1px solid rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.92);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #111;
    }

    .lang-menu {
      display: none;
      position: absolute;
      top: 46px;
      left: 0;
      width: 150px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 20;
    }

    .lang-menu.open {
      display: block;
    }

    .lang-menu a {
      display: block;
      padding: 10px 12px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .lang-menu a:last-child {
      border-bottom: none;
    }

    .nav-bar {
      background: #f7f7f7;
      border-bottom: 1px solid #ddd;
      padding: 10px 14px;
    }

    .center-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .center-nav::-webkit-scrollbar {
      display: none;
    }

    .center-nav a {
      text-decoration: none;
      color: #222;
      font-size: 18px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .center-nav a.highlight {
      background: #f3a9a9;
      color: #4b1d1d;
      padding: 8px 16px;
      border-radius: 999px;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 78vh;
      background: #0f1b35;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(10,20,45,0.45), rgba(10,20,45,0.45)),
        url("pahlavi-1.jpg") center center / cover no-repeat;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 78vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px 24px;
      text-align: center;
    }

    .hero-text {
      max-width: 700px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .hero-text .line1 {
      font-size: 30px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .hero-text .line2 {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .hero-text .line3 {
      font-size: 22px;
      font-weight: 700;
      opacity: 0.95;
    }

    .hero-image-box {
      display: none;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 34px 16px 50px;
    }

    .section-title {
      text-align: center;
      font-size: 30px;
     font-weight: 800;
      margin: 0 0 24px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .video-card {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .video-card video {
      width: 100%;
      display: block;
      background: #000;
    }

    .video-text {
      padding: 14px;
      font-size: 19px;
      font-weight: 700;
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .site-title { font-size: 24px; }
      .center-nav a { font-size: 16px; }
      .hero-text .line1 { font-size: 24px; }
      .hero-text .line2 { font-size: 48px; }
    }

    @media (max-width: 760px) {
      .flag-header,
      .flag-inner {
        min-height: 120px;
      }

      .site-title {
        font-size: 20px;
        padding: 7px 12px;
      }

      .center-nav a {
        font-size: 15px;
      }

      .hero { min-height: 62vh; }
      .hero-content { min-height: 62vh; }
      .hero-text .line1 { font-size: 21px; }
      .hero-text .line2 { font-size: 38px; }
      .hero-text .line3 { font-size: 18px; }

      .video-grid {
        grid-template-columns: 1fr;
      }

      .video-text {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {
      .site-title {
        font-size: 16px;
      }

      .lang-btn {
        padding: 7px 11px;
        font-size: 13px;
      }

      .center-nav a {
        font-size: 14px;
      }

      .hero-text .line2 {
        font-size: 32px;
      }
    }

    /* لپ‌تاپ و دسکتاپ: عکس کامل بدون کراپ */
    @media (min-width: 900px) {
      .hero {
        min-height: auto;
        background: #d9f6f7;
      }

      .hero::before {
        display: none;
      }

      .hero-content {
        min-height: auto;
        padding: 24px 16px 0;
      }

      .hero-text {
        display: none;
      }

      .hero-image-box {
        display: block;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        border: 2px solid #999;
        border-radius: 22px;
        padding: 14px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      }

      .hero-image-box img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 18px;
      }

      .hero-image-caption {
        margin-top: 12px;
        font-size: 20px;
        font-weight: 700;
        color: #111;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="flag-header">
      <div class="flag-overlay"></div>
      <div class="flag-inner">
        <div class="site-title">انقلاب شیر و خورشید</div>

        <div class="lang-wrap">
          <button class="lang-btn" id="langBtn">FA ▾</button>
          <div class="lang-menu" id="langMenu">
            <a href="index.html">English</a>
            <a href="farsi.html">فارسی</a>
            <a href="deutsch.html">Deutsch</a>
          </div>
        </div>
      </div>
    </div>

    <div class="nav-bar">
      <nav class="center-nav">
        <a href="history-fa.html">تاریخ</a>
        <a href="martyrs-fa.html">عکس جاویدنام‌ها</a>
        <a href="transition-fa.html">برنامه گذار</a>
        <a href="support-fa.html" class="highlight">اقدامات فوری</a>
        <a href="contact.html">ارتباط</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <div class="hero-text">
        <div class="line1">ما ملت بگیریم، ایران را پس می‌گیریم</div>
        <div class="line2">رضا پهلوی</div>
        <div class="line3">پیام مهم برای آینده ایران</div>
      </div>

      <div class="hero-image-box">
        <img src="pahlavi-1.jpg" alt="رضا پهلوی" />
        <div class="hero-image-caption">پیام مهم</div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">ویدیوهای مهم</h2>

    <div class="video-grid">
      <div class="video-card">
       <video controls poster="video-1.jpg">
          <source src="video-1.mp4" type="video/mp4" />
          مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>
        <div class="video-text">چشم‌انداز رضا پهلوی برای آینده‌ای دموکراتیک در ایران</div>
      </div>

      <div class="video-card">
        <video controls poster="video-2.jpg">
          <source src="video-2.mp4" type="video/mp4" />
          مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>
        <div class="video-text">پیامی از ایتالیا به ایرانیان: اشتباه ما را تکرار نکنید</div>
      </div>
    </div>
  </section>

  <script>
    const langBtn = document.getElementById("langBtn");
    const langMenu = document.getElementById("langMenu");

    langBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      langMenu.classList.toggle("open");
    });

    document.addEventListener("click", function (e) {
      if (!langMenu.contains(e.target) && !langBtn.contains(e.target)) {
        langMenu.classList.remove("open");
      }
    });
  </script>

</body>
</html>
