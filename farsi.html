<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انقلاب شیر و خورشید</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Tahoma, Arial, sans-serif;
      color: #111;
    }

    .hero {
      position: relative;
      width: 100%;
      background: #000;
      overflow: visible;
    }

    .hero img.flag {
      width: 100%;
      display: block;
    }

    .site-title {
      position: absolute;
      top: 14px;
      left: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      background: rgba(0,0,0,0.35);
      padding: 6px 10px;
      border-radius: 10px;
      z-index: 100;
    }

    .top-controls {
      position: absolute;
      top: 12px;
      right: 14px;
      left: auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      z-index: 120;
      direction: ltr;
    }

    .lang-mini {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.35);
      padding: 6px 8px;
      border-radius: 10px;
      direction: ltr;
    }

    .lang-mini a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 4px;
    }

    .menu-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 40px;
      border: none;
      cursor: pointer;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      background: rgba(0,0,0,0.35);
      border-radius: 10px;
      line-height: 1;
      user-select: none;
      z-index: 130;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 60px;
      right: 14px;
      left: auto;
      width: 250px;
      background: rgba(0, 70, 35, 0.97);
      border-radius: 16px;
      padding: 12px;
      z-index: 140;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      direction: rtl;
      text-align: right;
    }

    .dropdown-menu.open {
      display: block;
    }

    .dropdown-menu a {
      display: block;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.10);
      text-align: right;
    }

    .dropdown-menu a:last-child {
      margin-bottom: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 50px;
    }

    .hero-box {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 26px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .hero-box img {
      width: 100%;
      height: auto;
      border-radius: 18px;
      display: block;
    }

    .hero-caption {
      margin-top: 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .section-title {
      font-size: 26px;
      font-weight: 700;
      margin: 26px 0 18px;
      text-align: center;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .video-card {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .video-card video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    .video-text {
      padding: 14px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      line-height: 1.7;
    }

    @media (min-width: 800px) {
      .video-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .site-title {
        font-size: 13px;
        top: 10px;
        left: 10px;
        padding: 5px 8px;
      }

      .top-controls {
        top: 10px;
        right: 10px;
        left: auto;
        gap: 6px;
      }

      .lang-mini {
        gap: 4px;
        padding: 5px 6px;
      }

      .lang-mini a {
        font-size: 11px;
      }

      .menu-icon {
        width: 40px;
        height: 36px;
        font-size: 20px;
      }

      .dropdown-menu {
        top: 54px;
        right: 10px;
        left: auto;
        width: 220px;
      }

      .hero-caption,
      .video-text {
        font-size: 18px;
      }

      .section-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img class="flag" src="flag-main.jpg" alt="پرچم شیر و خورشید" />

    <div class="site-title">انقلاب شیر و خورشید</div>

    <div class="top-controls">
      <div class="lang-mini">
        <a href="index.html">EN</a>
        <a href="farsi.html">FA</a>
        <a href="deutsch.html">DE</a>
      </div>
      <button class="menu-icon" id="menuButton" type="button">☰</button>
    </div>

    <div id="dropdownMenu" class="dropdown-menu">
      <a href="urgent-fa.html">اقدامات فوری</a>
      <a href="history-fa.html">تاریخ</a>
      <a href="martyrs-fa.html">جاویدنامان</a>
      <a href="transition-fa.html">برنامه گذار شاهزاده</a>
      <a href="contact.html">ارتباط</a>
    </div>
  </div>

  <div class="container">
    <div class="hero-box">
      <img src="pahlavi-1.jpg" alt="شاهزاده رضا پهلوی" />
      <div class="hero-caption">پیام مهم</div>
    </div>

    <div class="section-title">ویدیوهای مهم</div>

    <div class="video-grid">
      <div class="video-card">
        <video controls poster="video-1.jpg">
          <source src="video-1.mp4" type="video/mp4" />
          مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>
        <div class="video-text">چشم‌انداز رضا پهلوی برای آینده‌ای دموکراتیک در ایران</div>
      </div>

      <div class="video-card">
        <video controls poster="video-2.jpg">
          <source src="video-2.mp4" type="video/mp4" />
          مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>
        <div class="video-text">پیامی از ایتالیا به ایرانیان: اشتباه ما را تکرار نکنید</div>
      </div>
    </div>
  </div>

  <script>
    const menuButton = document.getElementById("menuButton");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuButton.addEventListener("click", function (e) {
      e.stopPropagation();
      dropdownMenu.classList.toggle("open");
    });

    document.addEventListener("click", function (e) {
      if (!dropdownMenu.contains(e.target) && !menuButton.contains(e.target)) {
        dropdownMenu.classList.remove("open");
      }
    });
  </script>

</body>
</html>
