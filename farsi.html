<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انقلاب شیر و خورشید</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #d9f6f7;
      font-family: Tahoma, Arial, sans-serif;
      color: #111;
    }

    .topbar {
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 16px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .left-tools {
      position: relative;
      direction: ltr;
      flex: 0 0 auto;
    }

    .lang-btn {
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-menu {
      display: none;
      position: absolute;
      top: 42px;
      left: 0;
      width: 150px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 1001;
    }

    .lang-menu.open {
      display: block;
    }

    .lang-menu a {
      display: block;
      padding: 10px 12px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .lang-menu a:last-child {
      border-bottom: none;
    }

    .center-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: nowrap;
      flex: 1 1 auto;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      white-space: nowrap;
      padding: 2px 4px;
    }

    .center-nav::-webkit-scrollbar {
      display: none;
    }

    .center-nav a {
      text-decoration: none;
      color: #222;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .center-nav a.highlight {
      background: #f3a9a9;
      color: #4b1d1d;
      padding: 8px 14px;
      border-radius: 999px;
    }

    .right-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      direction: ltr;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .brand-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
      text-align: right;
      white-space: nowrap;
    }

    .brand-flag {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 78vh;
      background: #0f1b35;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(10,20,45,0.45), rgba(10,20,45,0.45)),
        url("pahlavi-1.jpg") center center / cover no-repeat;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 78vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px 24px;
      text-align: center;
    }

    .hero-text {
      max-width: 700px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .hero-text .line1 {
      font-size: 30px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .hero-text .line2 {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .hero-text .line3 {
      font-size: 22px;
      font-weight: 700;
      opacity: 0.95;
    }

    .hero-image-box {
      display: none;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 34px 16px 50px;
    }

    .section-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 24px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .video-card {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .video-card video {
      width: 100%;
      display: block;
      background: #000;
    }

    .video-text {
      padding: 14px;
      font-size: 19px;
      font-weight: 700;
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .center-nav a { font-size: 15px; }
      .center-nav { gap: 14px; }
    }

    @media (max-width: 980px) {
      .topbar { gap: 10px; }
      .center-nav a { font-size: 14px; }
      .center-nav { gap: 12px; }
      .hero-text .line1 { font-size: 24px; }
      .hero-text .line2 { font-size: 48px; }
    }

    @media (max-width: 760px) {
      .topbar {
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .left-tools { order: 1; }
      .right-brand { order: 2; margin-right: auto; }
      .center-nav {
        order: 3;
        width: 100%;
        justify-content: flex-start;
        padding-top: 4px;
      }

      .hero { min-height: 62vh; }
      .hero-content { min-height: 62vh; }
      .hero-text .line1 { font-size: 21px; }
      .hero-text .line2 { font-size: 38px; }
      .hero-text .line3 { font-size: 18px; }
      .video-grid { grid-template-columns: 1fr; }
      .video-text { font-size: 18px; }

      .brand-text { font-size: 15px; }
      .brand-flag {
        width: 48px;
        height: 48px;
      }
    }

    @media (max-width: 480px) {
      .brand-text { font-size: 14px; }
      .brand-flag {
        width: 44px;
        height: 44px;
      }
      .lang-btn {
        padding: 6px 10px;
        font-size: 13px;
      }
      .center-nav a { font-size: 14px; }
      .hero-text .line2 { font-size: 32px; }
    }

    @media (min-width: 900px) {
      .hero {
        min-height: auto;
        background: #d9f6f7;
      }

      .hero::before {
        display: none;
      }

      .hero-content {
        min-height: auto;
        padding: 24px 16px 0;
      }

      .hero-text {
        display: none;
      }

      .hero-image-box {
        display: block;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        background: #fff;
        border: 2px solid #999;
        border-radius: 22px;
        padding: 14px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      }

      .hero-image-box img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 18px;
      }

      .hero-image-caption {
        margin-top: 12px;
        font-size: 20px;
        font-weight: 700;
        color: #111;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="left-tools">
      <button class="lang-btn" id="langBtn">FA ▾</button>
      <div class="lang-menu" id="langMenu">
        <a href="index.html">English</a>
        <a href="farsi.html">فارسی</a>
        <a href="deutsch.html">Deutsch</a>
      </div>
    </div>

    <nav class="center-nav">
      <a href="history-fa.html">تاریخ</a>
      <a href="martyrs-fa.html">عکس جاویدنام‌ها</a>
      <a href="transition-fa.html">برنامه گذار</a>
      <a href="support-fa.html" class="highlight">اقدامات فوری</a>
      <a href="contact.html">ارتباط</a>
    </nav>

    <div class="right-brand">
      <div class="brand-text">انقلاب شیر و خورشید</div>
      <img class="brand-flag" src="flag-main.jpg" alt="پرچم" />
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <div class="hero-text">
        <div class="line1">ما ملت بگیریم، ایران را پس می‌گیریم</div>
        <div class="line2">رضا پهلوی</div>
        <div class="line3">پیام مهم برای آینده ایران</div>
      </div>

      <div class="hero-image-box">
        <img src="pahlavi-1.jpg" alt="رضا پهلوی" />
        <div class="hero-image-caption">پیام مهم</div>
      </div>
    </div>
  </section>
  <section class="section">
    <h2 class="section-title">ویدیوهای مهم</h2>

    <div class="video-grid">
      <div class="video-card">
        <video controls poster="video-1.jpg">
          <source src="video-1.mp4" type="video/mp4" />
          مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>
        <div class="video-text">چشم‌انداز رضا پهلوی برای آینده‌ای دموکراتیک در ایران</div>
      </div>

      <div class="video-card">
        <video controls poster="video-2.jpg">
          <source src="video-2.mp4" type="video/mp4" />
          مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>
        <div class="video-text">پیامی از ایتالیا به ایرانیان: اشتباه ما را تکرار نکنید</div>
      </div>
    </div>
  </section>

  <script>
    const langBtn = document.getElementById("langBtn");
    const langMenu = document.getElementById("langMenu");

    langBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      langMenu.classList.toggle("open");
    });

    document.addEventListener("click", function (e) {
      if (!langMenu.contains(e.target) && !langBtn.contains(e.target)) {
        langMenu.classList.remove("open");
      }
    });
  </script>

</body>
</html>
