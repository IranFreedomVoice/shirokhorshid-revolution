<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .top-flag {
      width: 100%;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 24px 110px;
    }

    .page-mark {
      text-align: right;
      font-size: 16px;
      font-weight: 700;
      color: #222;
      margin-bottom: 24px;
    }

    .buttons-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .contact-button {
      display: block;
      width: 100%;
      padding: 12px 14px;
      border-radius: 18px;
      border: 2px solid #888;
      background: linear-gradient(to left, #19b543 0%, #ffffff 50%, #ef1c1c 100%);
      color: #111;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .back-btn {
      position: fixed;
      left: 18px;
      bottom: 85px;
      display: inline-block;
      padding: 8px 16px;
      background: #fff;
      border: 2px solid #888;
      border-radius: 12px;
      color: #111;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
      z-index: 9999;
    }

    @media (max-width: 900px) {
      .page-mark {
        font-size: 15px;
      }

      .buttons-wrap {
        max-width: 380px;
      }

      .contact-button {
        font-size: 17px;
        padding: 11px 13px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 16px 100px;
      }

      .page-mark {
        font-size: 14px;
        margin-bottom: 18px;
      }

      .buttons-wrap {
        max-width: 280px;
      }

      .contact-button {
        font-size: 16px;
        padding: 11px 12px;
        border-radius: 15px;
      }

      .back-btn {
        left: 14px;
        bottom: 95px;
        font-size: 13px;
        padding: 7px 14px;
      }
    }
  </style>
</head>
<body>

  <div class="top-flag">
    <img src="c8811ebc-cd46-4b76-ac28-5fd641b23e2e.jpeg" alt="Flag" />
  </div>

  <div class="container">
    <div class="page-mark">Shir-o-khorshid Revolution</div>

    <div class="buttons-wrap">
      <a class="contact-button" href="mailto:freedom.voice.for.iran@gmail.com?subject=Contact">
        E-mail
      </a>

      <a class="contact-button" href="https://www.instagram.com/shirokhorshid_revolution?igsh=aW5kbm0za2cwYzNj" target="_blank">
        Instagram
      </a>

      <a class="contact-button" href="https://x.com/shahduneh?s=21" target="_blank">
        X
      </a>

      <a class="contact-button" href="https://t.me/+m1-XQEiPZL1kNzIy" target="_blank">
        Telegram
      </a>
    </div>
  </div>

  <a class="back-btn" href="index.html">Back</a>

</body>
</html>
