<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .top-flag {
      width: 100%;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .page-mark {
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      color: #222;
      margin-bottom: 22px;
    }

    .main-box {
      width: 100%;
      max-width: 760px;
      background: #eef9fa;
      border: 2px solid #b7cfd1;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      margin: 0 0 18px;
      text-align: left;
    }

    .text {
      font-size: 20px;
      line-height: 1.9;
      margin: 0 0 22px;
    }

    .contact-button {
      display: block;
      width: 100%;
      max-width: 580px;
      padding: 13px 18px;
      border-radius: 28px;
      border: 2px solid #888;
      background: linear-gradient(to right, #ef1c1c 0%, #ffffff 50%, #19b543 100%);
      color: #111;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      margin-bottom: 14px;
    }

    .email-text {
      font-size: 20px;
      font-weight: 700;
      margin-top: 8px;
      word-break: break-word;
    }

    .back-btn {
      display: inline-block;
      margin-top: 26px;
      padding: 11px 22px;
      border-radius: 14px;
      background: #fff;
      border: 2px solid #888;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 16px 50px;
      }

      .title {
        font-size: 28px;
      }

      .text,
      .email-text {
        font-size: 17px;
      }

      .contact-button {
        max-width: 100%;
        font-size: 16px;
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="top-flag">
    <img src="flag-main.jpg" alt="Flag" />
  </div>

  <div class="container">
    <div class="page-mark">Contact</div>

    <div class="main-box">
      <h1 class="title">Contact</h1>
      <p class="text">
        To contact us, please use the email address below.
      </p>

      <a class="contact-button" href="mailto:freedom.voice.for.iran@gmail.com">
        Send E-mail
      </a>

      <div class="email-text">freedom.voice.for.iran@gmail.com</div>
    </div>

    <a class="back-btn" href="index.html">Back</a>
  </div>
</body>
</html>
